<button class="{{ button.class_name }}"
  type="{{ button.button_type }}"
  {% if !button.aria_label.is_empty() %}aria-label="{{ button.aria_label }}"{% endif %}
  {% if !button.data_action.is_empty() %}data-action="{{ button.data_action }}"{% endif %}
  data-book-id="{{ button.target_id }}"
  data-track-click="{{ button.analytics.click_event }}"
  data-source="{{ button.analytics.source }}"
  data-target-type="{{ button.analytics.target_type }}"
  data-target-id="{{ button.analytics.target_id }}"
  {% if button.htmx.enabled %}hx-post="{{ button.htmx.post_url }}" {% if !button.htmx.vals.is_empty() %}hx-vals='{{ button.htmx.vals }}'{% endif %} hx-target="{{ button.htmx.target }}" hx-swap="{{ button.htmx.swap }}"{% endif %}
  {% if button.disabled %}disabled{% endif %}>{{ button.label }}</button>
