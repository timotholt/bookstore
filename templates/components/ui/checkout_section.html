<section class="checkout-section {{ section.class_name }}">
  <div>
    <p class="checkout-eyebrow">{{ section.eyebrow }}</p>
    <h2>{{ section.title }}</h2>
    <p>{{ section.body }}</p>
    {% let link = section.link.clone() %}
    {% include "components/ui/link.html" %}
  </div>
  <span class="checkout-status">{{ section.status }}</span>
</section>
